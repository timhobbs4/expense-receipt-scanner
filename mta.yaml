_schema-version: "3.1"
ID: receipt-tracker
version: 1.0.0
description: Mobile receipt expense tracker with Claude Vision OCR

# ── Build & Deploy ─────────────────────────────────────────────────────────────
# Build:  mbt build
# Deploy: cf deploy mta_archives/receipt-tracker_1.0.0.mtar
#
# Or use the CF manifest directly for a simpler workflow:
#   cf push -f manifest.yml
# ──────────────────────────────────────────────────────────────────────────────

modules:
  - name: receipt-tracker-app
    type: nodejs
    path: .
    build-parameters:
      builder: npm
      build-result: .
      ignore:
        - node_modules/
        - data/
        - .env
        - "*.db"
    parameters:
      memory: 256M
      disk-quota: 512M
      instances: 1
      buildpack: nodejs_buildpack
      health-check-type: http
      health-check-http-endpoint: /health
    properties:
      NODE_ENV: production
    requires:
      - name: receipts-db
      - name: anthropic-key
        parameters:
          optional: true

resources:
  # ── PostgreSQL managed service ────────────────────────────────────────────────
  # On BTP trial use plan "trial"; on productive accounts use "small" or above.
  - name: receipts-db
    type: org.cloudfoundry.managed-service
    parameters:
      service: postgresql-db
      service-plan: trial

  # ── Anthropic API key — user-provided service ─────────────────────────────────
  # Create before deploying:
  #   cf create-user-provided-service anthropic-key -p '{"ANTHROPIC_API_KEY":"sk-ant-..."}'
  #
  # Alternatively, skip this resource and set the key manually after deploy:
  #   cf set-env receipt-tracker ANTHROPIC_API_KEY sk-ant-...
  #   cf restage receipt-tracker
  - name: anthropic-key
    type: org.cloudfoundry.user-provided-service
