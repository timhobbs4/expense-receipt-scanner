version: 0.0
os: linux
files:
  - source: /
    destination: /var/www/app
permissions:
  - object: /var/www/app
    pattern: "**"
    owner: ec2-user
    group: ec2-user
    mode: 755
    type:
      - file
hooks:
  BeforeInstall:
    - location: scripts/installnode.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/installapp.sh
      timeout: 180
      runas: ec2-user
  ApplicationStart:
    - location: scripts/startserver.sh
      timeout: 60
      runas: ec2-user
  ApplicationStop:
    - location: scripts/restartserver.sh
      timeout: 30
      runas: ec2-user
