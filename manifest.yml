---
# SAP BTP Cloud Foundry deployment manifest
# Deploy with: cf push
#
# Prerequisites:
#   1. The env-factory-db PostgreSQL service must already exist in your space.
#      Verify with: cf services
#
#   2. Set your Anthropic API key after the first push:
#        cf set-env receipt-tracker ANTHROPIC_API_KEY <your-key>
#        cf restage receipt-tracker
#
#      Or use a user-provided service (add it to the services list below):
#        cf create-user-provided-service anthropic-key \
#           -p '{"ANTHROPIC_API_KEY":"<key>"}'

applications:
  - name: receipt-tracker
    path: .
    buildpack: nodejs_buildpack
    memory: 256M
    disk_quota: 512M
    instances: 1
    timeout: 120

    health-check-type: http
    health-check-http-endpoint: /health

    services:
      - env-factory-db        # Existing shared PostgreSQL instance in this space
      # - anthropic-key       # Uncomment if using a user-provided service for the API key

    env:
      NODE_ENV: production
      # This app creates and owns the "receipt_tracker" schema inside env-factory-db.
      # Change DB_SCHEMA only if you need to run multiple isolated instances of this
      # app against the same database (e.g. staging vs. production in one space).
      DB_SCHEMA: receipt_tracker
